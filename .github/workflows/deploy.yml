name: Docker
on:
  schedule:
    - cron: '23 2 * * *'
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  dotnet_build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: coasterpedia/coasterpedia-services/services

    outputs:
      digest: ${{steps.build-and-push.outputs.digest}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: InternalApi/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}-archivebot
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-archivebot
          platforms: linux/arm64

  deploy:
    runs-on: ubuntu-latest
    needs: [ dotnet_build ]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DOCKER_SSH_2_PRIVATE_KEY }}
          known_hosts: ${{ secrets.DOCKER_SSH_2_KNOWN_HOSTS }}

      - name: Deploy to server
        run: >
          ssh ${{ secrets.DOCKER_HOST_2 }} '
            export SERVICES_IMAGE="${{needs.dotnet_build.outputs.digest}}" &&
            export ARCHIVE_BOT_PASSWORD="${{secrets.ARCHIVE_BOT_PASSWORD}}" &&
            if cd archivebot; then git pull; else git clone --depth 1 -b main https://github.com/${{ github.repository }}; fi &&
            docker compose pull &&
            docker compose up -d -V &&
            docker system prune -f &&
            docker volume prune -f
          '
